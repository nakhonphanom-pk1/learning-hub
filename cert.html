<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>เกียรติบัตร</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #888; display: flex; flex-direction: column; align-items: center; padding: 30px 0 20px; font-family: 'Sarabun', sans-serif; }
.cert-wrap { position: relative; width: 297mm; height: 210mm; box-shadow: 0 8px 32px rgba(0,0,0,.4); background: white; }
.cert-wrap img { width: 297mm; height: 210mm; display: block; object-fit: fill; }
.cert-overlay { position: absolute; inset: 0; }

.cert-num {
  position: absolute;
  top: 13.45mm;
  right: 34.2mm;
  font-family: 'Sarabun', sans-serif;
  font-size: 4.2mm;
  font-weight: 600;
  color: #3a2000;
  white-space: nowrap;
}
.cert-name {
  position: absolute;
  top: 92.552mm;
  left: 5.8861mm; right: 0;
  text-align: center;
  font-family: 'Sarabun', sans-serif;
  font-size: 9mm;
  font-weight: 600;
  color: #1a1a2e;
  white-space: nowrap;
}
/* ========== LOCKED POSITIONS — ห้ามแก้ไข ==========
   cert-date : top 148.476mm left 136mm LOCKED
   ===================================================== */
.cert-date {
  position: absolute;
  top: 147.6mm;
  left: 138mm;
  text-align: left;
  font-family: 'Sarabun', sans-serif;
  font-size: 5.7mm;
  font-weight: 600;
  color: #1a1a2e;
  white-space: nowrap;
  overflow: visible;
}

.btn-wrap { margin-top: 16px; display: flex; gap: 12px; }
button { padding: 10px 28px; background: #1a2744; color: white; border: none; border-radius: 8px; font-family: 'Sarabun', sans-serif; font-size: 16px; cursor: pointer; }
button:hover { background: #243460; }

@media print {
  @page { size: 297mm 210mm; margin: 0; }
  html, body { margin: 0; padding: 0; width: 297mm; height: 210mm; background: white !important; display: block; }
  .btn-wrap { display: none !important; }
  .cert-wrap { box-shadow: none !important; position: fixed; top: 0; left: 0; }
}

<script>
// รับข้อมูลจาก URL params
const p = new URLSearchParams(window.location.search);
const name = p.get('name') || '-';
const num  = p.get('num')  || '-';
const date = p.get('date') || '-';
const course = p.get('course') || '';
const isTzd = course === 'tzd';
if (isTzd) document.body.classList.add('tzd');
// เพิ่ม พ.ศ. ถ้ายังไม่มี
// รูปแบบวันที่: "28  เมษายน  พ.ศ.2569" (เพิ่ม 2 เคาะหลังวันที่ และหลังเดือน, ชิด พ.ศ.2569)
function formatCertDate(d) {
  // รับ "28 เมษายน พ.ศ. 2569" หรือ "28 เมษายน 2569"
  const nb = '\u00a0'; // non-breaking space
  const m = d.match(/^(\d{1,2})\s+(\S+)\s+(?:พ\.ศ\.\s*)?(\d{4})$/);
  if(m) return m[1] + nb+nb + m[2] + nb+nb + 'พ.ศ.' + m[3];
  return d;
}
// TZD: เลขอารบิกทั้งหมด เว้นวรรคปกติ เช่น "10 มิถุนายน พ.ศ. 2569"
function formatTzdDate(d) {
  const m = d.match(/^(\d{1,2})\s+(\S+)\s+(?:พ\.ศ\.\s*)?(\d{4})$/);
  if (m) return m[1] + ' ' + m[2] + ' พ.ศ. ' + m[3];
  return d;
}
const dateDisplay = isTzd ? formatTzdDate(date) : formatCertDate(date);
// เพิ่มช่องว่างระหว่างชื่อและนามสกุล (non-breaking space x3)
function formatName(n) {
  const nb = '\u00a0';
  const gap = isTzd ? nb+nb : nb+nb+nb;  // TZD เว้น 2 เคาะ
  const parts = n.trim().split(/\s+/);
  if(parts.length >= 2) return parts[0] + gap + parts.slice(1).join(' ');
  return n;
}
document.getElementById('certName').textContent = formatName(name);
document.getElementById('certNum').textContent  = num;
document.getElementById('certDate').textContent = dateDisplay;
document.title = 'เกียรติบัตร - ' + name;

// กันชื่อ-นามสกุลยาวหลุดขอบ (เฉพาะ TZD): ลดขนาดฟอนต์อัตโนมัติให้กว้างไม่เกิน 200mm
// และขยับ top ชดเชยเพื่อให้ baseline อยู่ที่เดิม (86.58mm)
function fitTzdName() {
  const el = document.getElementById('certName');
  const wrap = document.querySelector('.cert-wrap');
  const pxPerMm = wrap.getBoundingClientRect().width / 297;
  const MAX_MM = 200, BASELINE_MM = 86.58, ASC = 0.834, MIN_MM = 6;
  let sizeMm = 9.70;
  const range = document.createRange();
  range.selectNodeContents(el);
  while (range.getBoundingClientRect().width > MAX_MM * pxPerMm && sizeMm > MIN_MM) {
    sizeMm -= 0.15;
    el.style.fontSize = sizeMm + 'mm';
    el.style.top = (BASELINE_MM - ASC * sizeMm) + 'mm';
  }
}
if (isTzd) {
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(fitTzdName);
  } else {
    window.addEventListener('load', fitTzdName);
  }
}
</script>
