<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>เกียรติบัตร</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #888; display: flex; flex-direction: column; align-items: center; padding: 30px 0 20px; font-family: 'Sarabun', sans-serif; }
.cert-wrap { position: relative; width: 297mm; height: 210mm; box-shadow: 0 8px 32px rgba(0,0,0,.4); background: white; }
.cert-wrap img { width: 297mm; height: 210mm; display: block; object-fit: fill; }
.cert-overlay { position: absolute; inset: 0; }

.cert-num {
  position: absolute;
  top: 13.45mm;
  right: 34.2mm;
  font-family: 'Sarabun', sans-serif;
  font-size: 4.2mm;
  font-weight: 600;
  color: #3a2000;
  white-space: nowrap;
}
.cert-name {
  position: absolute;
  top: 92.552mm;
  left: 5.8861mm; right: 0;
  text-align: center;
  font-family: 'Sarabun', sans-serif;
  font-size: 9mm;
  font-weight: 600;
  color: #1a1a2e;
  white-space: nowrap;
}
/* ========== LOCKED POSITIONS — ห้ามแก้ไข ==========
   cert-date : top 148.476mm left 136mm LOCKED
   ===================================================== */
.cert-date {
  position: absolute;
  top: 147.5mm;
  left: 136mm;
  text-align: left;
  font-family: 'Sarabun', sans-serif;
  font-size: 5.7mm;
  font-weight: 600;
  color: #1a1a2e;
  white-space: nowrap;
  overflow: visible;
}

.btn-wrap { margin-top: 16px; display: flex; gap: 12px; }
button { padding: 10px 28px; background: #1a2744; color: white; border: none; border-radius: 8px; font-family: 'Sarabun', sans-serif; font-size: 16px; cursor: pointer; }
button:hover { background: #243460; }

@media print {
  @page { size: 297mm 210mm; margin: 0; }
  html, body { margin: 0; padding: 0; width: 297mm; height: 210mm; background: white !important; display: block; }
  .btn-wrap { display: none !important; }
  .cert-wrap { box-shadow: none !important; position: fixed; top: 0; left: 0; }
}
</style>
</head>
<body>
<div class="cert-wrap">
  <img src="data:image/png;base64," alt="เกียรติบัตร">
  <div class="cert-overlay">
    <div class="cert-num" id="certNum">-</div>
    <div class="cert-name" id="certName">-</div>
    <div class="cert-date" id="certDate">-</div>
  </div>
</div>
<div class="btn-wrap">
  <button onclick="window.print()">🖨️ พิมพ์เกียรติบัตร</button>
  <button onclick="window.close()" style="background:#555;">✕ ปิด</button>
</div>
<script>
// รับข้อมูลจาก URL params
const p = new URLSearchParams(window.location.search);
const name = p.get('name') || '-';
const num  = p.get('num')  || '-';
const date = p.get('date') || '-';
// เพิ่ม พ.ศ. ถ้ายังไม่มี
// รูปแบบวันที่: "28  เมษายน  พ.ศ.2569" (เพิ่ม 2 เคาะหลังวันที่ และหลังเดือน, ชิด พ.ศ.2569)
function formatCertDate(d) {
  // รับ "28 เมษายน พ.ศ. 2569" หรือ "28 เมษายน 2569"
  const nb = '\u00a0'; // non-breaking space
  const m = d.match(/^(\d{1,2})\s+(\S+)\s+(?:พ\.ศ\.\s*)?(\d{4})$/);
  if(m) return m[1] + nb+nb + m[2] + nb+nb + 'พ.ศ.' + m[3];
  return d;
}
const dateDisplay = formatCertDate(date);
document.getElementById('certName').textContent = name;
document.getElementById('certNum').textContent  = num;
document.getElementById('certDate').textContent = dateDisplay;
document.title = 'เกียรติบัตร - ' + name;
</script>
</body>
</html>
