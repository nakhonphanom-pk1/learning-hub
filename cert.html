    <div class="cert-name" id="certName">-</div>
    <div class="cert-date" id="certDate">-</div>
  </div>
</div>
<div class="btn-wrap">
  <button onclick="window.print()">🖨️ พิมพ์เกียรติบัตร</button>
  <button onclick="window.close()" style="background:#555;">✕ ปิด</button>
</div>
<script>
// รับข้อมูลจาก URL params
const p = new URLSearchParams(window.location.search);
const name = p.get('name') || '-';
const num  = p.get('num')  || '-';
const date = p.get('date') || '-';
// เพิ่ม พ.ศ. ถ้ายังไม่มี
// รูปแบบวันที่: "28  เมษายน  พ.ศ.2569" (เพิ่ม 2 เคาะหลังวันที่ และหลังเดือน, ชิด พ.ศ.2569)
function formatCertDate(d) {
  // รับ "28 เมษายน พ.ศ. 2569" หรือ "28 เมษายน 2569"
  const nb = '\u00a0'; // non-breaking space
  const m = d.match(/^(\d{1,2})\s+(\S+)\s+(?:พ\.ศ\.\s*)?(\d{4})$/);
  if(m) return m[1] + nb+nb + m[2] + nb+nb + 'พ.ศ.' + m[3];
  return d;
}
const dateDisplay = formatCertDate(date);
// เพิ่มช่องว่างระหว่างชื่อและนามสกุล (non-breaking space x3)
function formatName(n) {
  const nb = '\u00a0';
  const parts = n.trim().split(/\s+/);
  if(parts.length >= 2) return parts[0] + nb+nb+nb + parts.slice(1).join(' ');
  return n;
}
document.getElementById('certName').textContent = formatName(name);
document.getElementById('certNum').textContent  = num;
document.getElementById('certDate').textContent = dateDisplay;
document.title = 'เกียรติบัตร - ' + name;
</script>
</body>
</html>
